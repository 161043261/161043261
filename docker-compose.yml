# docker-compose up -d # daemon
services:
  # docker-compose up -d mysql
  mysql:
    image: mysql:latest
    container_name: mysql
    hostname: mysql
    ports:
      - "3306:3306"
    privileged: true
    restart: on-failure
    environment:
      # MYSQL_NATIVE_PASSWORD: ON
      # MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: db0
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
      MYSQL_ROOT_PASSWORD: pass
      TZ: Asia/Shanghai
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
  # docker-compose down mysql -v

  # docker-compose up -d redis
  redis:
    image: redis:latest
    container_name: redis
    hostname: redis
    ports:
      - "6379:6379"
    privileged: true
    restart: on-failure
  # docker-compose down redis -v

  # docker-compose up -d mongo
  mongo:
    image: mongo:latest
    container_name: mongo
    hostname: mongo
    ports:
      - "27017:27017"
    privileged: true
    restart: on-failure
    environment:
      MONGO_INITDB_DATABASE: db0
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: pass
  # docker-compose down mongo -v

  # docker-compose up -d nginx
  nginx:
    image: nginx:latest
    container_name: nginx
    hostname: nginx
    ports:
      - "8080:8080"
    privileged: true
    restart: on-failure
    environment:
      NGINX_PORT: 80
  # docker-compose down nginx -v

  # docker-compose up -d postgres
  # psql -U root -W
  postgres:
    image: postgres:latest
    container_name: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    privileged: true
    restart: on-failure
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: pass
  # docker-compose down postgres -v

  # docker-compose up -d ubuntu-22.04
  ubuntu-22.04:
    image: ubuntu:22.04
    container_name: ubuntu-22.04
    hostname: ubuntu-22.04
    privileged: true
    restart: on-failure
    stdin_open: true
    tty: true
    volumes:
      - $HOME/ns3.40:$HOME/ns3.40
  # docker-compose down ubuntu-22.04 -v

  # docker exec -it ubuntu-22.04 /usr/bin/zsh
  # conda config --add channels conda-forge (aarch64)

  # docker-compose up -d ubuntu-24.04
  ubuntu-24.04:
    image: ubuntu:24.04
    container_name: ubuntu-24.04
    hostname: ubuntu-24.04
    privileged: true
    restart: on-failure
    stdin_open: true
    tty: true
  # docker-compose down ubuntu-24.04 -v

  # docker exec -it ubuntu-24.04 /usr/bin/zsh
  # conda config --add channels conda-forge (aarch64)

  # docker-compose up -d minio
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    privileged: true
    restart: on-failure
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "--console-address", ":9001", "/data"]
    volumes:
      - ./volumes/minio/data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 12345678
      MINIO_DEFAULT_BUCKET: s3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30
  # docker-compose down minio -v

  # docker-compose up -d mc
  mc:
    image: minio/mc:latest
    container_name: mc
    hostname: mc
    privileged: true
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin 12345678;
      mc admin user svcacct add myminio admin;
      mc rb --force myminio/s3;
      exit 0;
      "
  # docker-compose down mc -v

  # docker-compose up -d kafka
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - ./volumes/kafka/data:/var/lib/kafka/data
  # docker-compose down kafka -v

# docker-compose down -v # volume
