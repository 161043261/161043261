# docker-compose up -d # daemon
services:
  # docker-compose up -d redis
  redis:
    image: redis:latest
    container_name: redis
    hostname: redis
    ports:
      - "6379:6379"
    restart: always
  # docker-compose down redis -v

  # docker-compose up -d mysql
  mysql:
    image: mysql:8.4
    command: --mysql-native-password=ON
    container_name: mysql
    hostname: mysql
    ports:
      - "3306:3306"
    privileged: true
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: pass # 如果是数字, 则必须加 ""
      MYSQL_NATIVE_PASSWORD: ON
      TZ: Asia/Shanghai
  # docker-compose down mysql -v

  # docker-compose up -d mongo
  mongo:
    image: mongo
    container_name: mongo
    hostname: mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: pass
  # docker-compose down mongo -v

  # docker-compose up -d nginx
  nginx:
    image: nginx
    container_name: nginx
    hostname: nginx
    # restart: always
    ports:
      - "80:80"
    environment:
      - NGINX_PORT=80
  # docker-compose down nginx -v

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - 8123:8123 # http api
      - 9000:9000 # native (tcp api)
    network_mode: host
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      # default settings
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_USER: root
      CLICKHOUSE_PASSWORD: pass
      CLICKHOUSE_DB: db0
      CLICKHOUSE_SKIP_USER_SETUP: 1
    volumes:
      - ./docker/clickhouse/local/config.xml:/etc/clickhouse-server/config.xml
      - ./docker/clickhouse/local/users.xml:/etc/clickhouse-server/users.xml
      - .volumes/ch_data_dev:/var/lib/clickhouse
      - .volumes/ch_logs_dev:/var/log/clickhouse-server
    restart: on-failure
    networks:
      - internal
    healthcheck:
      # "clickhouse", "client", "-u ${CLICKHOUSE_USER}", "--password ${CLICKHOUSE_PASSWORD}", "-q 'SELECT 1'"
      test:
        wget -O /dev/null --no-verbose --tries=1 http://127.0.0.1:8123/ping ||
        exit 1
      interval: 1s
      timeout: 1s
      retries: 60
# docker-compose down -v # volume
